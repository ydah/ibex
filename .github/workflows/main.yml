name: CI

on:
  push:
    branches:
      - main

  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby: '3.0'
            experimental: false
          - ruby: '3.1'
            experimental: false
          - ruby: '3.2'
            experimental: false
          - ruby: '3.3'
            experimental: false
          - ruby: '3.4'
            experimental: false
          - ruby: '4.0'
            experimental: false
          - ruby: 'head'
            experimental: false
          - ruby: jruby
            experimental: true
    continue-on-error: ${{ matrix.experimental }}

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@a30dfa457ad68707b8b910ac3a244714b61c0626 # v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run the default task
        run: bundle exec rake

  rbs:
    runs-on: ubuntu-latest
    name: RBS and Steep
    env:
      BUNDLE_GEMFILE: gemfiles/Gemfile
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@a30dfa457ad68707b8b910ac3a244714b61c0626 # v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Check generated RBS signatures
        run: |
          ruby -rfileutils -e '
            output = File.join(ENV.fetch("RUNNER_TEMP"), "ibex-signatures")
            FileUtils.rm_rf(output)
            sources = Dir.glob("lib/**/*.rb").sort
            abort "no Ruby sources found" if sources.empty?
            command = ["bundle", "exec", "rbs-inline", "--opt-out", "--base=lib", "--output=#{output}", *sources]
            abort "RBS generation failed" unless system(*command)
          '
          diff -ru sig "$RUNNER_TEMP/ibex-signatures"
      - name: Validate RBS signatures
        run: bundle exec rbs -r digest -r json -r optparse -I sig validate
      - name: Type check Ruby implementation
        run: bundle exec steep check

  actionlint:
    runs-on: ubuntu-latest
    name: actionlint
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Check GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  zizmor:
    runs-on: ubuntu-latest
    name: zizmor
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Audit GitHub Actions workflows
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          advanced-security: false
          version: 1.27.0
